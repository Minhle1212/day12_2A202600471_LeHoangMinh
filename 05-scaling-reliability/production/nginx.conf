events { worker_connections 256; }

http {
    # Docker DNS resolver để tìm agent containers
    resolver 127.0.0.11 valid=10s;

    upstream agent_cluster {
        zone agent_cluster 64k;
        # Docker Compose tự tạo DNS "agent" → round-robin các instances
        server agent:8000 resolve;
    }

    server {
        listen 80;

        # Add instance header để thấy rõ load balancing
        add_header X-Served-By $upstream_addr always;

        location / {
            proxy_pass http://agent_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 2s;
            proxy_read_timeout 20s;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 3;
        }

        location /health {
            proxy_pass http://agent_cluster/health;
            access_log off;
        }
    }
}
